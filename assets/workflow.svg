<svg viewBox="0 0 960 650" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" role="img" aria-labelledby="workflowTitle workflowDescription">
  <title id="workflowTitle">LifeEnergyManager adaptive daily planning loop</title>
  <desc id="workflowDescription">A simple daily loop with three modules: plan the day, run the confirmed plan, and reflect. Planning memory uses goals, closures, capacity, drift, revisions, and actual results to size the next plan. Setup enters once and Sunday review resets the weekly focus.</desc>
  <defs>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#b86b00"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#087a55"/>
    </marker>
    <style>
      .card { fill:#ffffff; stroke:#d7dee8; stroke-width:1.4; }
      .title { font-size:15px; font-weight:700; fill:#172033; }
      .copy { font-size:11px; fill:#465569; }
      .small { font-size:10px; fill:#536176; }
      .label { font-size:10px; font-weight:800; letter-spacing:2px; fill:#5e6b7e; }
      .pill { fill:#ffffff; stroke:#d7dee8; stroke-width:1.2; }
    </style>
  </defs>

  <rect x="1" y="1" width="958" height="648" rx="20" fill="#f8fafc" stroke="#d7dee8"/>

  <text x="480" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#172033">LifeEnergyManager</text>
  <text x="480" y="65" text-anchor="middle" font-size="12.5" fill="#64748b">plan around real capacity · keep long-term goals visible · learn from each day</text>
  <text x="480" y="98" text-anchor="middle" class="label">THE DAILY LOOP · MONDAY–SATURDAY</text>

  <!-- 1. Morning planning: Guard, intake, revision, and final confirmation are one user-facing module. -->
  <g transform="translate(45 116)">
    <rect width="290" height="164" rx="14" fill="#fffaf0" stroke="#e3b866" stroke-width="1.4"/>
    <rect width="5" height="164" rx="2.5" fill="#c77a08"/>
    <circle cx="30" cy="30" r="14" fill="#9a5900"/>
    <text x="30" y="35" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff">1</text>
    <text x="54" y="35" class="title" fill="#8a4b00">Plan the day</text>
    <text x="24" y="66" class="copy">Guard goals and size work to real capacity</text>
    <text x="24" y="87" class="copy">Triage extra tasks and their future impact</text>
    <text x="24" y="108" class="copy">Revise only when the larger plan must change</text>
    <text x="24" y="130" class="copy" font-weight="700">You confirm the final daily plan</text>
    <circle cx="27" cy="149" r="4.5" fill="#b42318"/>
    <text x="38" y="153" class="small">due → close</text>
    <circle cx="136" cy="149" r="4.5" fill="#c77a08"/>
    <text x="147" y="153" class="small">material impact → revise</text>
  </g>

  <!-- 2. The artifact lock and execution are one confirmed-day module. -->
  <g transform="translate(380 132)">
    <rect width="200" height="132" rx="14" fill="#f1f7ff" stroke="#8ab4ed" stroke-width="1.4"/>
    <rect width="5" height="132" rx="2.5" fill="#2563b8"/>
    <circle cx="30" cy="30" r="14" fill="#2563b8"/>
    <text x="30" y="35" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff">2</text>
    <text x="54" y="35" class="title" fill="#174a8b">Run the plan</text>
    <text x="24" y="66" class="copy">Use the confirmed checklist</text>
    <text x="24" y="87" class="copy">HTML + wallpaper stay in sight</text>
    <text x="24" y="108" class="copy" font-weight="700">Artifact start locks revisions</text>
  </g>

  <!-- 3. Evening reporting and learning signals are one reflection module. -->
  <g transform="translate(625 116)">
    <rect width="290" height="164" rx="14" fill="#f7f4ff" stroke="#b4a1df" stroke-width="1.4"/>
    <rect width="5" height="164" rx="2.5" fill="#7251b5"/>
    <circle cx="30" cy="30" r="14" fill="#7251b5"/>
    <text x="30" y="35" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff">3</text>
    <text x="54" y="35" class="title" fill="#563594">Reflect</text>
    <text x="24" y="66" class="copy">Report outputs, blockers, and actual minutes</text>
    <text x="24" y="87" class="copy">Record unplanned work and displacement</text>
    <text x="24" y="108" class="copy">Capture energy and drive signals</text>
    <text x="24" y="130" class="copy" font-weight="700">Leave tomorrow's first action</text>
    <text x="24" y="151" class="small">0–100 signals guide planning, not diagnosis</text>
  </g>

  <line x1="335" y1="198" x2="374" y2="198" stroke="#64748b" stroke-width="2" marker-end="url(#arrowSlate)"/>
  <line x1="580" y1="198" x2="619" y2="198" stroke="#64748b" stroke-width="2" marker-end="url(#arrowSlate)"/>

  <!-- Adaptive loop: reflection records reality; memory sizes the next plan. -->
  <path d="M770 280 C735 344 652 390 566 410" fill="none" stroke="#b86b00" stroke-width="2.4" marker-end="url(#arrowAmber)"/>
  <text x="683" y="355" text-anchor="middle" font-size="10.5" font-weight="700" fill="#9a5900">records reality</text>
  <path d="M395 410 C306 390 226 344 190 286" fill="none" stroke="#b86b00" stroke-width="2.4" marker-end="url(#arrowAmber)"/>
  <text x="281" y="355" text-anchor="middle" font-size="10.5" font-weight="700" fill="#9a5900">sizes the next plan</text>

  <circle cx="480" cy="424" r="82" fill="#eef1ff" stroke="#7b87cf" stroke-width="1.5"/>
  <text x="480" y="397" text-anchor="middle" font-size="14" font-weight="700" fill="#35408b">Planning memory</text>
  <text x="480" y="421" text-anchor="middle" class="copy">goals · closures</text>
  <text x="480" y="441" text-anchor="middle" class="copy">capacity · drift</text>
  <text x="480" y="461" text-anchor="middle" class="copy">revisions · goal debt</text>
  <text x="480" y="481" text-anchor="middle" class="copy">actual results</text>

  <!-- Setup enters the memory once. Sunday review performs the weekly zoom-out. -->
  <g transform="translate(45 388)">
    <rect width="190" height="102" rx="14" class="card"/>
    <text x="95" y="31" text-anchor="middle" class="title">Setup · once</text>
    <text x="95" y="56" text-anchor="middle" class="copy">Turn goals and constraints</text>
    <text x="95" y="76" text-anchor="middle" class="copy">into the first living plan</text>
  </g>
  <line x1="235" y1="439" x2="391" y2="429" stroke="#64748b" stroke-width="1.7" marker-end="url(#arrowSlate)"/>

  <g transform="translate(725 378)">
    <rect width="190" height="122" rx="14" fill="#eefaf4" stroke="#86c8ac" stroke-width="1.4"/>
    <rect width="5" height="122" rx="2.5" fill="#0b8a60"/>
    <text x="99" y="31" text-anchor="middle" class="title" fill="#086548">Sunday review</text>
    <text x="99" y="53" text-anchor="middle" class="small">weekly zoom-out</text>
    <text x="99" y="77" text-anchor="middle" class="copy">Close due goals</text>
    <text x="99" y="97" text-anchor="middle" class="copy">Refocus next week's outcomes</text>
  </g>
  <line x1="565" y1="414" x2="719" y2="414" stroke="#64748b" stroke-width="1.7" marker-end="url(#arrowSlate)"/>
  <line x1="719" y1="463" x2="568" y2="463" stroke="#087a55" stroke-width="1.7" marker-end="url(#arrowGreen)"/>
  <text x="643" y="481" text-anchor="middle" font-size="10" font-weight="700" fill="#087a55">shapes Monday</text>

  <!-- Three stable principles summarize the guardrails without expanding the flow. -->
  <g transform="translate(45 548)">
    <rect width="270" height="48" rx="24" class="pill"/>
    <circle cx="25" cy="24" r="6" fill="#b42318"/>
    <text x="42" y="28" font-size="10.5" fill="#465569">Every due goal gets an ending</text>
  </g>
  <g transform="translate(345 548)">
    <rect width="270" height="48" rx="24" class="pill"/>
    <circle cx="25" cy="24" r="6" fill="#c77a08"/>
    <text x="42" y="28" font-size="10.5" fill="#465569">Material changes stay user-confirmed</text>
  </g>
  <g transform="translate(645 548)">
    <rect width="270" height="48" rx="24" class="pill"/>
    <circle cx="25" cy="24" r="6" fill="#0b8a60"/>
    <text x="42" y="28" font-size="10.5" fill="#465569">A hard day never raises tomorrow's load</text>
  </g>

  <text x="480" y="625" text-anchor="middle" class="small">the detailed closure, confirmation, and feasibility rules remain in the user guide and workflow contract</text>
</svg>
