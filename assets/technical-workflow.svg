<svg viewBox="0 0 1280 960" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" role="img" aria-labelledby="technicalWorkflowTitle technicalWorkflowDescription">
  <title id="technicalWorkflowTitle">LifeEnergyManager technical planning workflow</title>
  <desc id="technicalWorkflowDescription">Authoritative state enters Goal Drift Guard, extra-task intake, and Plan Modification. Proposed and final change sets return to the Guard. The separately confirmed daily snapshot passes a final Guard gate before artifact locking. Execution evidence updates planning memory and feeds next-plan inputs back into the next morning Guard.</desc>
  <defs>
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#087a55"/></marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#9a5900"/></marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b42318"/></marker>
    <style>
      .card { fill:#ffffff; stroke:#d7dee8; stroke-width:1.4; }
      .title { font-size:16px; font-weight:750; fill:#172033; }
      .section { font-size:10.5px; font-weight:800; letter-spacing:1.5px; fill:#5e6b7e; }
      .copy { font-size:11.5px; fill:#465569; }
      .small { font-size:10px; fill:#536176; }
      .route { font-size:10.5px; font-weight:700; fill:#465569; }
    </style>
  </defs>

  <rect x="1" y="1" width="1278" height="958" rx="20" fill="#f8fafc" stroke="#d7dee8"/>
  <text x="640" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#172033">LifeEnergyManager · Technical Workflow</text>
  <text x="640" y="53" text-anchor="middle" font-size="12" fill="#64748b">authoritative state → Guard → modification → confirmed snapshot → locked artifacts → evidence-calibrated next plan</text>
  <text x="30" y="90" class="section">MORNING · BEFORE ARTIFACT GENERATION</text>

  <!-- Authoritative state input -->
  <g transform="translate(30 260)">
    <rect width="160" height="130" rx="12" class="card"/>
    <text x="80" y="29" text-anchor="middle" class="title">Read state</text>
    <line x1="16" y1="44" x2="144" y2="44" stroke="#e3e8ef"/>
    <text x="18" y="68" class="copy">Goal Registry</text>
    <text x="18" y="90" class="copy">phase · month · tracker</text>
    <text x="18" y="112" class="copy">history · active revision</text>
  </g>

  <!-- Primary module 1 -->
  <g transform="translate(220 165)">
    <rect width="290" height="400" rx="14" fill="#eefaf4" stroke="#218565" stroke-width="2.2"/>
    <rect width="290" height="52" rx="14" fill="#dff4e9"/>
    <rect y="40" width="290" height="12" fill="#dff4e9"/>
    <text x="18" y="33" font-size="17" font-weight="800" fill="#086548">Goal Drift Guard</text>
    <text x="167" y="33" font-size="9" font-weight="800" fill="#086548">PREFLIGHT + RECHECK</text>

    <text x="18" y="80" class="section">INPUTS</text>
    <text x="18" y="103" class="copy">Baselines, exit criteria, hard/soft DDL</text>
    <text x="18" y="125" class="copy">28-day capacity, revisions, delay, goal debt</text>
    <line x1="18" y1="143" x2="272" y2="143" stroke="#b9dfce"/>

    <text x="18" y="167" class="section">CHECKS</text>
    <text x="18" y="191" class="copy">1. Due without terminal evidence?</text>
    <text x="18" y="215" class="copy">2. Proximity and latest safe start?</text>
    <text x="18" y="239" class="copy">3. Corrected remaining vs safe capacity?</text>
    <text x="18" y="263" class="copy">4. Repeated revisions, delay, or debt?</text>
    <text x="18" y="287" class="copy">5. Unsupported move of a hard DDL?</text>
    <line x1="18" y1="304" x2="272" y2="304" stroke="#b9dfce"/>

    <text x="18" y="328" class="section">ROUTES</text>
    <circle cx="23" cy="348" r="5" fill="#087a55"/>
    <text x="36" y="352" class="route">pass / warning → protect today's action</text>
    <circle cx="23" cy="368" r="5" fill="#b42318"/>
    <text x="36" y="372" class="route">closure_required → block planning</text>
    <circle cx="23" cy="388" r="5" fill="#b42318"/>
    <text x="36" y="392" class="route">blocked → keep baseline / require evidence</text>
  </g>

  <!-- Intake remains secondary. -->
  <g transform="translate(540 260)">
    <rect width="140" height="130" rx="12" class="card"/>
    <text x="70" y="29" text-anchor="middle" class="title">Morning intake</text>
    <line x1="14" y1="44" x2="126" y2="44" stroke="#e3e8ef"/>
    <text x="16" y="68" class="copy">Extra tasks</text>
    <text x="16" y="90" class="copy">Urgency triage</text>
    <text x="16" y="112" class="copy">One-day / multi-day</text>
  </g>

  <!-- Primary module 2 -->
  <g transform="translate(710 165)">
    <rect width="320" height="400" rx="14" fill="#fff8e8" stroke="#c7790a" stroke-width="2.2"/>
    <rect width="320" height="52" rx="14" fill="#ffefc8"/>
    <rect y="40" width="320" height="12" fill="#ffefc8"/>
    <text x="18" y="33" font-size="17" font-weight="800" fill="#8a4b00">Plan Modification</text>
    <text x="188" y="33" font-size="10" font-weight="700" fill="#8a4b00">REVISION GATE</text>

    <text x="18" y="80" class="section">CLASSIFY IMPACT</text>
    <text x="18" y="103" class="copy">none · no persistent plan effect</text>
    <text x="18" y="125" class="copy">inline · same-capacity reorder / within cap</text>
    <text x="18" y="147" class="copy">correction · path/cap or month/phase impact</text>
    <text x="18" y="169" class="copy">rebaseline · replaced target / infeasible path</text>
    <line x1="18" y1="187" x2="302" y2="187" stroke="#ead09d"/>

    <text x="18" y="211" class="section">CONFIRM</text>
    <text x="18" y="234" class="copy">none / inline → provisional plan</text>
    <text x="18" y="256" class="copy">material weekly / commitment → 1 reply</text>
    <text x="18" y="278" class="copy">month / phase / any rebaseline → 3 replies</text>
    <text x="18" y="299" class="small">facts change resets #1 · change-set edit resets #2</text>
    <line x1="18" y1="316" x2="302" y2="316" stroke="#ead09d"/>

    <text x="18" y="340" class="section">COMMIT OR EXIT</text>
    <text x="18" y="363" class="copy">Final Guard pass → atomic write; tracker last</text>
    <text x="18" y="385" class="copy">Explicit exit → re-read plan → daily plan</text>
  </g>

  <!-- Separate daily confirmation, final-snapshot Guard, and artifact boundary. -->
  <g transform="translate(1060 185)">
    <rect width="190" height="125" rx="12" fill="#f1f7ff" stroke="#8ab4ed" stroke-width="1.5"/>
    <text x="95" y="30" text-anchor="middle" class="title">Daily plan</text>
    <line x1="16" y1="45" x2="174" y2="45" stroke="#d5e4f6"/>
    <text x="18" y="70" class="copy">Protected critical action</text>
    <text x="18" y="92" class="copy">Goal Alerts</text>
    <text x="18" y="114" class="copy" font-weight="700">User confirms separately</text>
  </g>

  <g transform="translate(1060 335)">
    <rect width="190" height="75" rx="12" fill="#e8f7f0" stroke="#218565" stroke-width="1.8"/>
    <text x="95" y="29" text-anchor="middle" class="title" fill="#086548">Final snapshot Guard</text>
    <text x="95" y="53" text-anchor="middle" class="copy">confirmed snapshot must pass</text>
  </g>

  <g transform="translate(1060 435)">
    <rect width="190" height="140" rx="12" fill="#eef4ff" stroke="#4d86ce" stroke-width="1.8"/>
    <text x="95" y="29" text-anchor="middle" class="title">Artifact boundary</text>
    <line x1="16" y1="44" x2="174" y2="44" stroke="#d5e4f6"/>
    <text x="18" y="68" class="copy">Persist lock before render</text>
    <text x="18" y="90" class="copy">HTML + PNG · same revision</text>
    <text x="18" y="112" class="copy">QA before presentation</text>
    <text x="18" y="132" class="small">Late input → unplanned log; no regen</text>
  </g>

  <!-- Mainline -->
  <line x1="190" y1="325" x2="214" y2="325" stroke="#64748b" stroke-width="2" marker-end="url(#arrowSlate)"/>
  <line x1="510" y1="325" x2="534" y2="325" stroke="#087a55" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <line x1="680" y1="325" x2="704" y2="325" stroke="#64748b" stroke-width="2" marker-end="url(#arrowSlate)"/>
  <line x1="1030" y1="247" x2="1054" y2="247" stroke="#087a55" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <line x1="1155" y1="310" x2="1155" y2="329" stroke="#64748b" stroke-width="2" marker-end="url(#arrowSlate)"/>
  <line x1="1155" y1="410" x2="1155" y2="429" stroke="#087a55" stroke-width="2.2" marker-end="url(#arrowGreen)"/>

  <!-- Bidirectional proposal/final-change-set Guard loop. -->
  <path d="M870 165 L870 116 L365 116 L365 159" fill="none" stroke="#087a55" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <text x="620" y="110" text-anchor="middle" class="small" fill="#087a55">proposal / final change set → Guard</text>
  <path d="M430 165 L430 137 L790 137 L790 159" fill="none" stroke="#9a5900" stroke-width="1.8" marker-end="url(#arrowAmber)"/>
  <text x="610" y="151" text-anchor="middle" class="small" fill="#9a5900">Guard result → active revision gate</text>

  <!-- Closure and successor routes. -->
  <g transform="translate(235 610)">
    <rect width="260" height="100" rx="12" fill="#fff1ef" stroke="#c85b52" stroke-width="1.8"/>
    <text x="130" y="28" text-anchor="middle" class="title">Closure decision · blocking</text>
    <text x="18" y="54" class="copy">Choose terminal status and evidence</text>
    <text x="18" y="76" class="copy">Record remaining-work disposition</text>
    <text x="18" y="94" class="small">No answer → no daily plan or artifacts</text>
  </g>
  <line x1="365" y1="565" x2="365" y2="604" stroke="#b42318" stroke-width="2" marker-end="url(#arrowRed)"/>
  <path d="M495 650 L520 650 L520 470 L511 470" fill="none" stroke="#087a55" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <text x="530" y="596" class="small" fill="#087a55">terminal recorded; no successor → rerun Guard</text>
  <path d="M495 680 L870 680 L870 571" fill="none" stroke="#9a5900" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowAmber)"/>
  <text x="680" y="697" text-anchor="middle" class="small" fill="#9a5900">successor / rebaseline needed → Plan Modification</text>

  <!-- Explicit system plan feedback loop. -->
  <rect x="30" y="745" width="1220" height="190" rx="16" fill="#f0f9f5" stroke="#8fcab0" stroke-width="1.5"/>
  <text x="640" y="772" text-anchor="middle" font-size="13" font-weight="800" letter-spacing="1.8" fill="#086548">PLAN FEEDBACK LOOP</text>
  <text x="640" y="792" text-anchor="middle" class="small">actual execution evidence recalibrates the next plan instead of copying unfinished work forward</text>

  <g transform="translate(970 810)">
    <rect width="250" height="78" rx="12" class="card"/>
    <text x="125" y="27" text-anchor="middle" class="title">Execute + actual evidence</text>
    <text x="18" y="51" class="copy">outputs · blockers · actual minutes</text>
    <text x="18" y="70" class="small">unplanned displacement · scores</text>
  </g>
  <g transform="translate(650 810)">
    <rect width="270" height="78" rx="12" fill="#eef1ff" stroke="#8792d2" stroke-width="1.5"/>
    <text x="135" y="27" text-anchor="middle" class="title">Planning memory update</text>
    <text x="18" y="51" class="copy">calibration · closure · revision history</text>
    <text x="18" y="70" class="small">goal debt remains visible</text>
  </g>
  <g transform="translate(350 810)">
    <rect width="250" height="78" rx="12" fill="#ffffff" stroke="#86c8ac" stroke-width="1.5"/>
    <text x="125" y="27" text-anchor="middle" class="title">Next-plan inputs</text>
    <text x="18" y="51" class="copy">safe capacity · active goals</text>
    <text x="18" y="70" class="small">protected action · priority order</text>
  </g>
  <g transform="translate(680 900)">
    <rect width="210" height="26" rx="13" fill="#ffffff" stroke="#86c8ac"/>
    <text x="105" y="18" text-anchor="middle" class="small">Sunday review joins this update</text>
  </g>

  <path d="M1155 575 L1155 804" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowSlate)"/>
  <line x1="970" y1="849" x2="926" y2="849" stroke="#64748b" stroke-width="2" marker-end="url(#arrowSlate)"/>
  <line x1="650" y1="849" x2="606" y2="849" stroke="#087a55" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="785" y1="900" x2="785" y2="894" stroke="#087a55" stroke-width="1.7" marker-end="url(#arrowGreen)"/>
  <path d="M350 849 L205 849 L205 520 L214 520" fill="none" stroke="#087a55" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <text x="214" y="731" class="small" fill="#087a55">next morning → Guard</text>
</svg>
